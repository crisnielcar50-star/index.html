<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeyySagash — El Original</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0702;
            color: #fff;
            font-family: Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .tarjeta {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .version-badge {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #C9A84C;
            font-family: Arial, sans-serif;
            border: 1px solid #C9A84C44;
            padding: 0.35rem 1rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .logo {
            width: 80px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        h1 {
            font-size: 2rem;
            color: #C9A84C;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
        }

        .subtitulo {
            font-size: 0.85rem;
            color: #ffffff44;
            font-family: Arial, sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .descripcion {
            font-size: 1rem;
            color: #ffffff88;
            line-height: 1.9;
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        .descripcion strong {
            color: #fff;
            font-style: normal;
        }

        .linea {
            width: 60px;
            height: 1px;
            background: #C9A84C44;
            margin: 0 auto 2.5rem;
        }

        .btn-nuevo {
            display: inline-block;
            background: #C9A84C;
            color: #0a0702;
            padding: 0.9rem 2rem;
            border-radius: 30px;
            font-family: Arial, sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .btn-nuevo:hover { background: #e5c05b; }

        .footer {
            margin-top: 3rem;
            font-size: 0.72rem;
            color: #ffffff1a;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="version-badge">Versión 1.0 — Archivo histórico</div>
        <img class="logo" src="fotooficial.png" alt="HeyySagash">
        <h1>HeyySagash</h1>
        <p class="subtitulo">El original · La semilla</p>
        <div class="linea"></div>
        <p class="descripcion">
            Aquí nació todo.<br>
            La primera versión de <strong>HeyySagash</strong> —<br>
            construida desde cero, con visión y sin manuales.
        </p>
        <a class="btn-nuevo" href="https://sagash.vercel.app">
            Ver HeyySagash 2.0 →
        </a>
        <p class="footer">HeyySagash · Colombia · 2025</p>
    </div>
</body>
</html>
